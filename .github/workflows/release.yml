# 推送语义化版本 tag 时自动构建多平台可执行文件并发布 Release

name: Release

on:
  push:
    tags:
      - "v[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package archive
        shell: bash
        run: |
          bin_name="ibr"
          stage="ibr-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$stage"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${bin_name}.exe" "$stage/"
          else
            cp "target/${{ matrix.target }}/release/${bin_name}" "$stage/"
          fi
          cp readme.org LICENSE "$stage/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${stage}.zip" "$stage"
            echo "ASSET=${stage}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${stage}.tar.gz" "$stage"
            echo "ASSET=${stage}.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
